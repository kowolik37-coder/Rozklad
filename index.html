<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Rozkład GZM</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { color: #333; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .tile { 
            background: #2196F3; color: white; padding: 20px; text-align: center; 
            text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .tile:active { transform: scale(0.95); background: #1976D2; }
    </style>
</head>
<body>

    <h2>Wybierz przystanek:</h2>
    
    <div class="grid">
        <a href="https://rj.transportgzm.pl/v2/rozklady/przystanek/stop/723/" class="tile">Przystanek 723</a>
        <a href="https://rj.transportgzm.pl/v2/rozklady/przystanek/stop/724/" class="tile">Przystanek 724</a>
        <a href="https://rj.transportgzm.pl/v2/rozklady/przystanek/stop/725/" class="tile">Przystanek 725</a>
        <a href="https://rj.transportgzm.pl/v2/rozklady/przystanek/stop/3704/" class="tile">Przystanek 3704</a>
    </div>

</body>
</html>
