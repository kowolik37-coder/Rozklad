<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rozkład Jazdy - Gierałtowice</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h2 { color: #ffcc00; margin-bottom: 30px; text-align: center; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-left: 5px solid #ffcc00;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card:active {
            background-color: #333;
            transform: scale(0.98);
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>🚌 Rozkład Jazdy</h2>

    <div class="grid">
        <a href="https://rj.transportgzm.pl/przystanek/5232/" class="card">GRANICA DO KNUROWA</a>
        <a href="https://rj.transportgzm.pl/przystanek/5231/" class="card">GRANICA DO SZKOŁY</a>
        <a href="https://rj.transportgzm.pl/przystanek/3704/" class="card">POCZTA DO DOMU</a>
    </div>

    <p class="info-text">Kliknij kafelek, aby otworzyć rozkład w nowym oknie.</p>

</body>
</html>
